name: Rust

on: [push, pull_request]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.78.0
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - name: Run tests
      run: make test
    - name: Run lint
      run: make lint
    - name: Build
      run: make build

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.78.0
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - name: Run tests
      run: make test
    - name: Run lint
      run: make lint
    - name: Build
      run: make build

  e2e-faults:
    runs-on: ubuntu-latest
    needs: build-linux
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: /tmp/cargo-tonel
        key: e2e-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
    - name: Run Fault Matrix
      env:
        DOCKER_BUILDKIT: 1
      run: make e2e
    - name: Upload E2E Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-logs
        path: target/e2e
        if-no-files-found: ignore
