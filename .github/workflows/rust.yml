name: Rust

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        components: clippy
    - name: Run tests
      run: make test
    - name: Run lint
      run: make lint
    - name: Build
      run: make build

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        components: clippy
    - name: Run tests
      run: make test
    - name: Run lint
      run: make lint
    - name: Build
      run: make build

  e2e-faults:
    runs-on: ubuntu-latest
    needs: build-linux

    steps:
    - uses: actions/checkout@v3
    - name: Run Fault Matrix
      run: bash tests/e2e/fault_matrix.sh
    - name: Upload E2E Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-logs
        path: target/e2e
